name: Release Workflow

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project (production)
        run: npm run build:prod

      - name: Verify build output
        run: ls -la dist/

  create_release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project (production)
        run: npm run build:prod

      - name: Verify build output
        run: ls -la dist/

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION=${TAG_NAME#v}
          
          echo "Tag: $TAG_NAME"
          echo "Version: $VERSION"
          
          awk -v ver="$VERSION" '
            BEGIN { in_section = 0; print_section = 0 }
            /^#{2,3} \[/ {
              if (print_section) exit
              if ($0 ~ "\\[" ver "]") {
                print_section = 1
                next
              }
            }
            print_section { print }
          ' CHANGELOG.md > /tmp/release_notes.txt
          
          RELEASE_NOTE=$(cat /tmp/release_notes.txt | head -100)
          
          if [ -z "$RELEASE_NOTE" ]; then
            RELEASE_NOTE="No release notes found for version $VERSION"
          fi
          
          echo "=== Extracted release notes ==="
          echo "$RELEASE_NOTE"
          echo "=== End release notes ==="
          
          echo "RELEASE_NOTE<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ${{ steps.release_notes.outputs.RELEASE_NOTE }}
          draft: false
          prerelease: false
          files: dist/*

  publish:
    needs: [build, create_release]
    runs-on: ubuntu-latest
    if: (github.event_name == 'release' && github.event.action == 'created') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build project (production)
        run: npm run build:prod

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}