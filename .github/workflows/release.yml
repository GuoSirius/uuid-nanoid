name: Release Workflow

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project (production)
        run: npm run build:prod

      - name: Verify build output
        run: ls -la dist/

  create_release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION=${TAG_NAME#v}
          
          echo "Tag: $TAG_NAME"
          echo "Version: $VERSION"
          
          START=$(grep -n "^##\{2,3\} \[$VERSION\]" CHANGELOG.md | head -1 | cut -d: -f1)
          echo "Start line: $START"
          
          if [ -z "$START" ]; then
            echo "RELEASE_NOTE=No release notes found for version $VERSION"
            echo "RELEASE_NOTE=No release notes found for version $VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          END=$(sed -n "$((START+1)),$ p" CHANGELOG.md | grep -n "^##\{2,3\} \[" | head -1 | cut -d: -f1)
          
          if [ -z "$END" ]; then
            END=100
          else
            END=$((START + END))
          fi
          
          echo "End line: $END"
          
          RELEASE_NOTE=$(sed -n "$((START+1)),$((END-1))p" CHANGELOG.md)
          
          echo "=== Extracted release notes ==="
          echo "$RELEASE_NOTE"
          echo "=== End release notes ==="
          
          echo "RELEASE_NOTE<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ${{ steps.release_notes.outputs.RELEASE_NOTE }}
          draft: false
          prerelease: false

  publish:
    needs: [build, create_release]
    runs-on: ubuntu-latest
    if: (github.event_name == 'release' && github.event.action == 'created') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build project (production)
        run: npm run build:prod

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}